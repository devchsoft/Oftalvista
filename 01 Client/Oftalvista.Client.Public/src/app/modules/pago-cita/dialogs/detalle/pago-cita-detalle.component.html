<div class="dialog-wrap" style="min-width: 480px">
  <div class="dialog-header">
    <div>
      <div class="dialog-title">Detalle — Pago de Cita</div>
      <div class="dialog-subtitle">Informacion de solo lectura</div>
    </div>
    <mat-icon style="color: var(--ov-primary); font-size: 28px; width: 28px; height: 28px"
      >payments</mat-icon
    >
  </div>
  <mat-dialog-content>
    <div class="detalle-grid" style="padding-top: 8px">
      <div class="detalle-item">
        <label>ID</label><span>{{ data.idPagoCita ?? '—' }}</span>
      </div>
      <div class="detalle-item">
        <label>Monto</label><span>{{ data.monto ?? '—' }}</span>
      </div>
      <div class="detalle-item">
        <label>Fecha Pago</label><span>{{ data.fechaPago ?? '—' }}</span>
      </div>
      <div class="detalle-item">
        <label>N° Operacion</label><span>{{ data.numeroOperacion ?? '—' }}</span>
      </div>
      <div class="detalle-item">
        <label>Comprobante</label><span>{{ data.comprobante ?? '—' }}</span>
      </div>
      <div class="detalle-item">
        <label>Estado</label><span>{{ data.idTblEstadoVigencia ?? '—' }}</span>
      </div>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-flat-button color="primary" (click)="ref.close()">Cerrar</button>
  </mat-dialog-actions>
</div>
