<div class="premium-shell">
  <app-sidebar></app-sidebar>
  <div class="content-wrap">
    <app-topbar title="Usuarios" subtitle="Mantenimiento de usuarios del sistema"></app-topbar>
    <div class="page-container">
      <mat-card class="table-card">
        <div class="action-bar">
          <h2>Listado</h2>
          <button mat-flat-button color="primary" (click)="nuevo()">
            <mat-icon>add</mat-icon> Nuevo
          </button>
        </div>
        <div class="filter-row">
          <mat-form-field appearance="outline">
            <mat-label>N° Documento</mat-label>
            <input matInput [formControl]="filtros.controls['numeroDocumento']" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Fecha Desde</mat-label>
            <input matInput [formControl]="filtros.controls['fechaRegistroDesde']" type="date" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Fecha Hasta</mat-label>
            <input matInput [formControl]="filtros.controls['fechaRegistroHasta']" type="date" />
          </mat-form-field>
          <button mat-flat-button color="primary" (click)="buscar()">
            <mat-icon>search</mat-icon> Buscar
          </button>
          <button mat-stroked-button (click)="limpiar()"><mat-icon>clear</mat-icon> Limpiar</button>
        </div>
        <div style="position: relative; min-height: 180px">
          <mat-spinner
            *ngIf="loading"
            diameter="40"
            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%)"
          ></mat-spinner>
          <table mat-table [dataSource]="data" style="width: 100%">
            <ng-container matColumnDef="rowNum">
              <th mat-header-cell *matHeaderCellDef>#</th>
              <td mat-cell *matCellDef="let r">{{ r.rowNum }}</td>
            </ng-container>
            <ng-container matColumnDef="nombres">
              <th mat-header-cell *matHeaderCellDef>Nombres</th>
              <td mat-cell *matCellDef="let r">{{ r.nombres }}</td>
            </ng-container>
            <ng-container matColumnDef="apellidos">
              <th mat-header-cell *matHeaderCellDef>Apellidos</th>
              <td mat-cell *matCellDef="let r">{{ r.apellidos }}</td>
            </ng-container>
            <ng-container matColumnDef="correo">
              <th mat-header-cell *matHeaderCellDef>Correo</th>
              <td mat-cell *matCellDef="let r">{{ r.correo }}</td>
            </ng-container>
            <ng-container matColumnDef="telefono">
              <th mat-header-cell *matHeaderCellDef>Telefono</th>
              <td mat-cell *matCellDef="let r">{{ r.telefono }}</td>
            </ng-container>
            <ng-container matColumnDef="idTblEstadoVigencia">
              <th mat-header-cell *matHeaderCellDef>Estado</th>
              <td mat-cell *matCellDef="let r">
                <span [class]="chipEstado(r.idTblEstadoVigencia)">{{
                  labelEstado(r.idTblEstadoVigencia)
                }}</span>
              </td>
            </ng-container>
            <ng-container matColumnDef="acciones">
              <th mat-header-cell *matHeaderCellDef style="text-align: right">Acciones</th>
              <td mat-cell *matCellDef="let r" style="text-align: right">
                <button mat-icon-button matTooltip="Ver" (click)="ver(r)">
                  <mat-icon>visibility</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Editar" color="primary" (click)="editar(r)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="eliminar(r)">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="cols"></tr>
            <tr mat-row *matRowDef="let row; columns: cols"></tr>
          </table>
        </div>
        <mat-paginator
          [length]="total"
          [pageSize]="pageSize"
          [pageSizeOptions]="[10, 25, 50]"
          (page)="onPage($event)"
          showFirstLastButtons
        ></mat-paginator>
      </mat-card>
    </div>
  </div>
</div>
